# PalletGridCNN Ver 4.0 — 1-Class baseline
# ※ 레거시 버전. 현재는 v5_hw_aware 사용 권장.

model:
  version: "v4_1class"
  input_size: [256, 256]
  in_channels: 3
  channels: [16, 32, 64, 128]
  head_channels: 18
  num_anchors: 3
  num_classes: 1
  grid_size: 32

anchors:
  - [0.05, 0.05]
  - [0.15, 0.10]
  - [0.35, 0.20]

train:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  lr_scheduler: cosine
  weight_decay: 0.0005
  checkpoint_dir: "../../../weights/v4_1class/"

loss:
  lambda_obj: 1.0
  lambda_noobj: 0.5
  lambda_bbox: 5.0
  lambda_cls: 1.0

data:
  train_dir: "../../dataset/splits/train"
  val_dir: "../../dataset/splits/val"
  test_dir: "../../dataset/splits/test"
  augment: true
