# PalletGridCNN Ver 5.0 — Hardware-Aware Co-Design
# 채널 수: LCM(4, 6)=12 배수 → DSP 낭비 0%

model:
  version: "v5_hw_aware"
  input_size: [256, 256]      # H, W
  in_channels: 3
  # 내부 채널: 12의 배수 (In블록=4, Out블록=6의 LCM)
  channels: [12, 24, 48, 96]
  head_channels: 18           # 3 Anchor x 6값 (tx,ty,tw,th,obj,cls)
  num_anchors: 3
  num_classes: 1              # hole only
  grid_size: 32               # 출력 Grid 해상도

anchors:
  - [0.05, 0.05]  # 작은 구멍
  - [0.15, 0.10]  # 중간 구멍
  - [0.35, 0.20]  # 큰 팔레트

train:
  epochs: 100
  batch_size: 16
  learning_rate: 0.001
  lr_scheduler: cosine
  weight_decay: 0.0005
  num_workers: 4
  checkpoint_dir: "../../../weights/v5_hw_aware/"

loss:
  lambda_obj: 1.0
  lambda_noobj: 0.5
  lambda_bbox: 5.0
  lambda_cls: 1.0

data:
  train_dir: "../../dataset/splits/train"
  val_dir: "../../dataset/splits/val"
  test_dir: "../../dataset/splits/test"
  augment: true
